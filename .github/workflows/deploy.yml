name: 定期データ更新トリガー (Vercel)

# Vercel の Deploy Hook を呼んで再ビルド＆デプロイをトリガーする。
# ビルド中に npm run fetch が走り、最新RSS/APIデータが取得される。
# cron は UTC。'0 0,8,16 * * *' は日本時間でおおよそ 9:00 / 17:00 / 1:00 に相当（1日3回）。
#
# 事前準備:
#   Vercel ダッシュボード → プロジェクト設定 → Git → Deploy Hooks でフックを作成し、
#   そのURLを GitHub リポジトリの Secrets (VERCEL_DEPLOY_HOOK_URL) に登録すること。

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Vercel 再ビルドをトリガー
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
